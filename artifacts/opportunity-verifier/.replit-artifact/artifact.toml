kind = "web"
previewPath = "/"
title = "Student Opportunity Verifier"
version = "1.0.0"
id = "artifacts/opportunity-verifier"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20352

[services.development]
run = "pnpm --filter @workspace/opportunity-verifier run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opportunity-verifier", "run", "build" ]
publicDir = "artifacts/opportunity-verifier/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20352"
BASE_PATH = "/"
