<!DOCTYPE html>
<html>
<head>
  <title>Docx Reader</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <h1>Docx Reader</h1>
  <input type="file" id="fileInput">
  <div id="output" style="white-space: pre-wrap; font-family: monospace; margin-top: 20px; border: 1px solid #ccc; padding: 10px;"></div>
  
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        JSZip.loadAsync(evt.target.result).then(function(zip) {
          return zip.file("word/document.xml").async("text");
        }).then(function(xmlText) {
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");
          const paragraphs = xmlDoc.getElementsByTagName("w:p");
          let outputText = "";
          
          for (let i = 0; i < paragraphs.length; i++) {
            const paragraph = paragraphs[i];
            const texts = paragraph.getElementsByTagName("w:t");
            let pText = "";
            for (let j = 0; j < texts.length; j++) {
              pText += texts[j].textContent;
            }
            outputText += pText + "\n";
          }
          
          document.getElementById('output').innerText = outputText;
        }).catch(function(err) {
          document.getElementById('output').innerText = "Error: " + err.message;
        });
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
